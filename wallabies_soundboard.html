<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldcoast Wallabies — Game Day Soundboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #060d18;
  --surface:  #0c1828;
  --card:     #101f34;
  --card-h:   #152540;
  --border:   #1d3050;
  --gold:     #f5a623;
  --gold-d:   #c4831a;
  --gold-glow:rgba(245,166,35,.18);
  --teal:     #00c9a7;
  --teal-glow:rgba(0,201,167,.15);
  --red:      #e63946;
  --red-glow: rgba(230,57,70,.18);
  --text:     #e8ecf0;
  --muted:    #5a7090;
  --muted2:   #3a5070;
  --key-bg:   #0a1520;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
  overflow-x: hidden;
}

/* ── background grid texture ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,201,167,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,201,167,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.wrap { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  margin-bottom: 1.5rem;
  position: relative;
}
.header::after {
  content: '';
  display: block;
  height: 2px;
  margin-top: 1.5rem;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.mascot { font-size: 52px; line-height: 1; display: block; margin-bottom: .5rem;
  filter: drop-shadow(0 0 18px rgba(245,166,35,.5)); }

.team-name {
  font-size: clamp(22px, 5vw, 32px);
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  background: linear-gradient(135deg, #f5a623 30%, #ffe082 60%, #c4831a 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.team-sub {
  font-size: 11px;
  letter-spacing: .35em;
  color: var(--teal);
  text-transform: uppercase;
  margin-top: .35rem;
}

/* ── SCOREBOARD strip ── */
.scoreboard {
  display: flex; align-items: center; justify-content: center; gap: .5rem;
  margin-top: 1rem;
}
.score-led {
  font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
  padding: .25rem .7rem; border-radius: 4px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted);
}
#live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── CONTROLS BAR ── */
.controls {
  display: flex; gap: .6rem; align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: .75rem 1rem;
  margin-bottom: 1.2rem;
}
.controls label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.controls .vol-val { font-size: 11px; color: var(--gold); min-width: 34px; text-align: right; }
input[type=range] {
  flex: 1; height: 4px; cursor: pointer;
  accent-color: var(--gold);
  background: var(--border);
  border-radius: 2px;
}

/* ── CATEGORY FILTER ── */
.cats {
  display: flex; gap: .5rem; flex-wrap: wrap;
  margin-bottom: 1.1rem;
}
.cat-btn {
  font-size: 11px; font-weight: 600; letter-spacing: .05em;
  padding: .35rem .85rem; border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted);
  cursor: pointer; transition: all .15s;
}
.cat-btn:hover { border-color: var(--gold); color: var(--gold); }
.cat-btn.active { border-color: var(--gold); background: rgba(245,166,35,.12); color: var(--gold); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 10px;
  margin-bottom: 1.2rem;
}

/* ── SOUND BUTTONS ── */
.snd-btn {
  position: relative; overflow: hidden;
  padding: 14px 14px 12px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer; text-align: left; width: 100%;
  transition: border-color .15s, background .15s, transform .08s, box-shadow .15s;
  color: inherit;
  display: flex; flex-direction: column; gap: 4px;
}
.snd-btn:hover { border-color: var(--gold-d); background: var(--card-h); }
.snd-btn:active { transform: scale(0.96); }

.snd-btn.playing {
  border-color: var(--gold);
  background: var(--card-h);
  box-shadow: 0 0 20px var(--gold-glow), inset 0 0 30px rgba(245,166,35,.06);
  animation: pulse-gold 1.8s ease-in-out infinite;
}
.snd-btn.playing.cat-defense { border-color: var(--teal); box-shadow: 0 0 20px var(--teal-glow); animation: pulse-teal 1.8s ease-in-out infinite; }

@keyframes pulse-gold { 0%,100%{box-shadow:0 0 16px var(--gold-glow)} 50%{box-shadow:0 0 32px rgba(245,166,35,.35)} }
@keyframes pulse-teal { 0%,100%{box-shadow:0 0 16px var(--teal-glow)} 50%{box-shadow:0 0 32px rgba(0,201,167,.3)} }

/* ripple on click */
.snd-btn::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: radial-gradient(circle at var(--rx,50%) var(--ry,50%), rgba(245,166,35,.18) 0%, transparent 70%);
  opacity: 0; transition: opacity .4s;
}
.snd-btn.rip::after { opacity:1; transition: opacity 0s; }

.btn-top { display: flex; justify-content: space-between; align-items: flex-start; }
.badge {
  font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 8px;
  background: rgba(255,255,255,.06); color: var(--muted);
}
.snd-btn.playing .badge { background: rgba(245,166,35,.2); color: var(--gold); }
.snd-btn.playing.cat-defense .badge { background: rgba(0,201,167,.2); color: var(--teal); }

.key-hint {
  font-size: 10px; font-weight: 700;
  min-width: 20px; height: 20px;
  border-radius: 5px; border: 1px solid var(--border);
  background: var(--key-bg); color: var(--muted2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
}
.snd-btn.playing .key-hint { border-color: var(--gold); color: var(--gold); }

.snd-icon { font-size: 22px; margin: 4px 0 2px; }
.snd-title { font-size: 14px; font-weight: 700; color: var(--text); }
.snd-when { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* playing bar */
.play-bar {
  height: 2px; border-radius: 1px; margin-top: 8px;
  background: var(--border); overflow: hidden;
}
.play-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--gold-d), var(--gold));
  border-radius: 1px;
  transition: width .1s linear;
}
.snd-btn.playing .play-bar-fill { animation: bar-loop 1.6s ease-in-out infinite; }
.snd-btn.playing.cat-defense .play-bar-fill { background: linear-gradient(90deg, #00a08a, var(--teal)); }
@keyframes bar-loop { 0%{width:0%} 60%{width:100%} 100%{width:0%} }

/* ── STOP BUTTON ── */
.stop-btn {
  width: 100%; padding: 13px;
  background: var(--surface);
  border: 1.5px solid #2a1520;
  border-radius: 12px;
  font-size: 13px; font-weight: 600; letter-spacing: .08em;
  color: var(--red); cursor: pointer;
  transition: background .15s, border-color .15s, box-shadow .15s;
  text-transform: uppercase;
}
.stop-btn:hover { background: rgba(230,57,70,.08); border-color: var(--red); box-shadow: 0 0 20px var(--red-glow); }

/* ── FOOTER ── */
.footer {
  text-align: center; margin-top: 2rem;
  font-size: 10px; color: var(--muted2); letter-spacing: .1em;
  text-transform: uppercase;
}

/* ── responsive ── */
@media(max-width:480px) {
  .grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <span class="mascot">🦘</span>
    <div class="team-name">Goldcoast Wallabies</div>
    <div class="team-sub">Game Day Soundboard &nbsp;·&nbsp; The Warren</div>
    <div class="scoreboard">
      <div class="score-led">Live Sound</div>
      <div id="live-dot"></div>
      <div class="score-led">Press key 1–0 or tap</div>
    </div>
  </div>

  <!-- VOLUME -->
  <div class="controls">
    <label>Lautstärke</label>
    <input type="range" min="0" max="100" value="80" id="vol" step="1">
    <span class="vol-val" id="vout">80%</span>
  </div>

  <!-- CATEGORY FILTER -->
  <div class="cats" id="cats">
    <button class="cat-btn active" data-cat="all">Alle</button>
    <button class="cat-btn" data-cat="attack">Angriff</button>
    <button class="cat-btn" data-cat="defense">Defense</button>
    <button class="cat-btn" data-cat="celebration">Jubel</button>
    <button class="cat-btn" data-cat="timeout">Timeout</button>
  </div>

  <!-- SOUND GRID -->
  <div class="grid" id="grid"></div>

  <!-- STOP -->
  <button class="stop-btn" id="stopbtn">⬛&nbsp; Alles stoppen &nbsp;[Esc]</button>

  <div class="footer">Goldcoast Wallabies Basketball &nbsp;·&nbsp; The Warren Arena Sound System</div>
</div>

<script>
// ─── NOTE TABLE ───────────────────────────────────────────────
const N={
  C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,Bb3:233.08,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,Ab4:415.3,A4:440,Bb4:466.16,B4:493.88,
  C5:523.25,D5:587.33,Eb5:622.25,E5:659.25,F5:698.46,G5:783.99,Ab5:830.61,A5:880,Bb5:932.33,B5:987.77,
  C6:1046.5,D6:1174.66,E6:1318.51
};

// Harmonics [multiple, weight]
const DB=[[1,.78],[2,.62],[3,.50],[4,.36],[5,.22],[6,.16],[8,.10],[.5,.10]];

// ─── SOUND LIBRARY ───────────────────────────────────────────
// All timings scaled ~1.6× slower than original for natural feel
const SOUNDS=[
  {
    id:'intro', key:'1', cat:'celebration',
    title:'Team Intro', icon:'🏟️',
    when:'Einlaufen / Spielbeginn',
    seq:[
      [N.C4,.12,0],[N.E4,.12,.19],[N.G4,.12,.38],[N.C5,.12,.58],
      [N.E5,.12,.80],[N.G5,.12,1.02],[N.C6,.75,1.28],
      [N.G5,.12,2.32],[N.E5,.12,2.51],[N.C5,.12,2.70],
      [N.G4,.12,2.90],[N.C5,.75,3.12]
    ]
  },
  {
    id:'charge', key:'2', cat:'attack',
    title:'Charge!', icon:'⚡',
    when:'Nach Dunk / Block / Steal',
    seq:[
      [N.G4,.18,0],[N.C5,.18,.26],[N.E5,.18,.52],
      [N.G5,.18,.78],[N.E5,.15,1.04],[N.G5,1.10,1.28]
    ]
  },
  {
    id:'threept', key:'3', cat:'celebration',
    title:'Three-Pointer!', icon:'🔥',
    when:'Nach Dreier',
    seq:[
      [N.C5,.12,0],[N.D5,.12,.18],[N.E5,.12,.36],[N.G5,.12,.54],
      [N.A5,.12,.72],[N.C6,.12,.90],[N.A5,.12,1.10],[N.G5,.12,1.30],
      [N.E5,.12,1.50],[N.C6,.90,1.70]
    ]
  },
  {
    id:'letsgo', key:'4', cat:'attack',
    title:"Let's Go!", icon:'🏀',
    when:'Angriff / Energie aufbauen',
    seq:[
      [N.C5,.14,0],[N.E5,.14,.20],[N.G5,.28,.40],
      [N.E5,.14,.72],[N.C5,.28,.92],[N.G4,.14,1.24],[N.C5,.24,1.44]
    ]
  },
  {
    id:'defense', key:'5', cat:'defense',
    title:'Defense!', icon:'🛡️',
    when:'Gegner greift an',
    seq:[
      [N.D4,.16,0],[N.D4,.16,.24],[N.A4,.38,.56],
      [N.D4,.16,1.20],[N.D4,.16,1.44],[N.A4,.66,1.78]
    ]
  },
  {
    id:'pump', key:'6', cat:'attack',
    title:'Pump It Up', icon:'💥',
    when:'Crowd aufpeitschen',
    seq:[
      [N.C5,.14,0],[N.E5,.14,.22],[N.G5,.14,.44],[N.A5,.14,.66],
      [N.G5,.14,.88],[N.E5,.14,1.10],[N.C5,.57,1.32]
    ]
  },
  {
    id:'heysong', key:'7', cat:'timeout',
    title:'Hey Song', icon:'🎵',
    when:'Timeout / Halbzeit',
    seq:[
      [N.E4,.15,0],[N.E4,.15,.22],[N.G4,.15,.44],[N.E4,.15,.66],[N.D4,.55,.88],
      [N.G4,.15,1.65],[N.G4,.15,1.87],[N.A4,.15,2.09],[N.G4,.15,2.31],[N.F4,.55,2.53],
      [N.E4,.15,3.30],[N.G4,.15,3.52],[N.A4,.15,3.74],[N.C5,.55,3.96]
    ]
  },
  {
    id:'victory', key:'8', cat:'celebration',
    title:'Victory!', icon:'🏆',
    when:'Sieg / gewonnenes Viertel',
    seq:[
      [N.C5,.14,0],[N.E5,.14,.19],[N.G5,.14,.38],[N.C6,.14,.57],
      [N.G5,.12,.76],[N.Ab4,.12,.94],[N.A4,.12,1.12],[N.C5,.12,1.30],
      [N.E5,.12,1.48],[N.G5,.12,1.66],[N.C6,1.20,1.84]
    ]
  },
  {
    id:'wallabies', key:'9', cat:'celebration',
    title:'Go Wallabies!', icon:'🦘',
    when:'Vereins-Hymne / Jubel',
    seq:[
      [N.C5,.18,0],[N.G5,.18,.30],[N.E5,.18,.60],[N.C5,.18,.90],
      [N.G4,.18,1.20],[N.C5,.18,1.50],[N.E5,.18,1.80],[N.G5,.18,2.10],
      [N.A5,.18,2.40],[N.G5,.18,2.70],[N.E5,.18,3.00],[N.C5,.75,3.30],
      [N.G5,.18,4.40],[N.C6,.75,4.70]
    ]
  },
  {
    id:'timeout', key:'0', cat:'timeout',
    title:'Timeout', icon:'⏱️',
    when:'Auszeit / Spielunterbrechung',
    seq:[
      [N.G5,.28,0],[N.E5,.28,.38],[N.C5,.28,.76],[N.G4,.28,1.14],
      [N.C5,.14,1.70],[N.E5,.14,1.90],[N.G5,.75,2.10]
    ]
  }
];

// ─── AUDIO ENGINE ─────────────────────────────────────────────
let ctx=null, activeOscs=[], currentBtn=null, currentSound=null;
let reverb=null, compressor=null;

function initCtx(){
  if(ctx)return;
  ctx=new(window.AudioContext||window.webkitAudioContext)();

  // soft limiter
  compressor=ctx.createDynamicsCompressor();
  compressor.threshold.value=-12;
  compressor.knee.value=6;
  compressor.ratio.value=4;
  compressor.attack.value=0.003;
  compressor.release.value=0.25;
  compressor.connect(ctx.destination);

  // reverb (convolution)
  reverb=ctx.createConvolver();
  const sr=ctx.sampleRate, len=Math.floor(sr*2.4);
  const buf=ctx.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6);
  }
  reverb.buffer=buf;

  const reverbGain=ctx.createGain(); reverbGain.gain.value=.20;
  reverb.connect(reverbGain); reverbGain.connect(compressor);
}

function vol(){ return parseInt(document.getElementById('vol').value)/100; }

function stopAll(){
  activeOscs.forEach(o=>{ try{o.stop();}catch(e){} });
  activeOscs=[];
  if(currentBtn){ currentBtn.classList.remove('playing'); currentBtn=null; }
  currentSound=null;
}

function playSeq(seq, t0){
  const ac=ctx, v=vol()*0.34;
  const master=ac.createGain(); master.gain.value=v;
  master.connect(compressor);
  master.connect(reverb);

  // gentle vibrato LFO
  const lfo=ac.createOscillator(), lfog=ac.createGain();
  lfo.frequency.value=6.5; lfog.gain.value=.08*v;
  lfo.connect(lfog); lfog.connect(master.gain);
  const seqEnd=t0+Math.max(...seq.map(([f,d,t])=>t+d))+.35;
  lfo.start(t0); lfo.stop(seqEnd); activeOscs.push(lfo);

  seq.forEach(([freq,dur,t])=>{
    const s=t0+t, e=s+dur;
    const env=ac.createGain();
    env.gain.setValueAtTime(0,s);
    env.gain.linearRampToValueAtTime(1, s+.016);
    env.gain.setValueAtTime(1, e-.04);
    env.gain.linearRampToValueAtTime(0, e+.02);
    env.connect(master);

    // key click transient
    const click=ac.createOscillator(), cg=ac.createGain();
    click.frequency.value=freq*5; cg.gain.setValueAtTime(.22,s);
    cg.gain.linearRampToValueAtTime(0, s+.009);
    click.connect(cg); cg.connect(env);
    click.start(s); click.stop(s+.015); activeOscs.push(click);

    // harmonic partials (organ timbre)
    DB.forEach(([h,w])=>{
      const osc=ac.createOscillator(), hg=ac.createGain();
      hg.gain.value=w; osc.type='sine'; osc.frequency.value=freq*h;
      // slight detune for warmth
      const osc2=ac.createOscillator(), hg2=ac.createGain();
      hg2.gain.value=w*.3; osc2.type='sine'; osc2.frequency.value=freq*h*(1+.0018);
      osc.connect(hg); hg.connect(env);
      osc2.connect(hg2); hg2.connect(env);
      osc.start(s); osc.stop(e+.1);
      osc2.start(s); osc2.stop(e+.1);
      activeOscs.push(osc,osc2);
    });
  });
}

function play(sound, btn){
  initCtx();
  if(ctx.state==='suspended') ctx.resume();
  stopAll();
  currentBtn=btn; currentSound=sound;
  btn.classList.add('playing');
  playSeq(sound.seq, ctx.currentTime);
  const dur=Math.max(...sound.seq.map(([f,d,t])=>t+d));
  setTimeout(()=>{ if(currentBtn===btn){ btn.classList.remove('playing'); currentBtn=null; currentSound=null; } }, (dur+.5)*1000);
}

// ─── UI BUILD ─────────────────────────────────────────────────
const grid=document.getElementById('grid');
let activeCat='all';

function buildGrid(){
  grid.innerHTML='';
  SOUNDS.forEach((s,i)=>{
    if(activeCat!=='all' && s.cat!==activeCat) return;
    const btn=document.createElement('button');
    btn.className=`snd-btn cat-${s.cat}`;
    btn.dataset.id=s.id;
    btn.innerHTML=`
      <div class="btn-top">
        <span class="badge">One-shot</span>
        <span class="key-hint">${s.key}</span>
      </div>
      <div class="snd-icon">${s.icon}</div>
      <span class="snd-title">${s.title}</span>
      <span class="snd-when">${s.when}</span>
      <div class="play-bar"><div class="play-bar-fill"></div></div>
    `;

    // ripple effect
    btn.addEventListener('pointerdown', e=>{
      const r=btn.getBoundingClientRect();
      btn.style.setProperty('--rx', ((e.clientX-r.left)/r.width*100)+'%');
      btn.style.setProperty('--ry', ((e.clientY-r.top)/r.height*100)+'%');
      btn.classList.add('rip');
      setTimeout(()=>btn.classList.remove('rip'), 420);
    });

    btn.addEventListener('click',()=>{
      // toggle off if already playing
      if(currentSound && currentSound.id===s.id){ stopAll(); return; }
      play(s, btn);
    });
    grid.appendChild(btn);

    // restore playing state if same sound is active
    if(currentBtn && currentSound && currentSound.id===s.id){
      btn.classList.add('playing');
      currentBtn=btn;
    }
  });
}

buildGrid();

// ─── CATEGORY FILTER ──────────────────────────────────────────
document.getElementById('cats').addEventListener('click', e=>{
  const cb=e.target.closest('.cat-btn');
  if(!cb) return;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  cb.classList.add('active');
  activeCat=cb.dataset.cat;
  buildGrid();
});

// ─── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.repeat) return;
  if(e.key==='Escape'){ stopAll(); return; }
  const k=e.key==='0'?'0':e.key;
  const s=SOUNDS.find(s=>s.key===k);
  if(!s) return;
  // find the button if visible
  const btn=document.querySelector(`.snd-btn[data-id="${s.id}"]`);
  if(btn) btn.click();
  else {
    // sound not visible in current filter — play anyway
    if(currentSound && currentSound.id===s.id){ stopAll(); return; }
    play(s, { classList:{ add:()=>{}, remove:()=>{} }, dataset:{} });
  }
});

// ─── VOLUME ───────────────────────────────────────────────────
const vs=document.getElementById('vol'), vo=document.getElementById('vout');
vs.addEventListener('input',()=>vo.textContent=vs.value+'%');

// ─── STOP ─────────────────────────────────────────────────────
document.getElementById('stopbtn').addEventListener('click', stopAll);
</script>
</body>
</html>
